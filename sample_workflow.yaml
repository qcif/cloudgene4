# Sample Cloudgene Workflow Configuration
id: hello-cloudgene
name: Hello Cloudgene
description: A simple workflow to test Cloudgene functionality
version: 1.0.0
website: https://cloudgene.io
category: test

workflow:
  steps:
    - name: HelloStep
      classname: workflows.steps.HelloWorldStep
      
  inputs:
    - id: input_text
      description: Input text message
      type: text
      value: "Hello World"
      required: true
      
    - id: input_file
      description: Input file
      type: file
      required: false
      
    - id: number_input
      description: Number input
      type: number
      value: 42
      required: true
      
    - id: checkbox_input
      description: Enable feature
      type: checkbox
      value: true
      values:
        true: "Enable"
        false: "Disable"
        
    - id: list_input
      description: Select option
      type: list
      value: "option1"
      values:
        option1: "Option 1"
        option2: "Option 2"
        option3: "Option 3"
        
    - id: folder_input
      description: Input folder
      type: folder
      required: false

  outputs:
    - id: output_file
      description: Output file
      type: file
      download: true
      
    - id: output_folder
      description: Output folder
      type: folder
      download: true