# Cloudgene Server Configuration

server:
  name: "Cloudgene Django Server"
  port: 8000
  maintenance: false
  max_jobs: 10
  max_queue_size: 50
  debug: true

# Navigation bar configuration
navbar:
  - title: "Home"
    url: "/"
    icon: "home"
    order: 1
    visible: true
    
  - title: "Workflows"
    url: "/workflows"
    icon: "workflow"
    order: 2
    visible: true
    
  - title: "Jobs"
    url: "/jobs"
    icon: "jobs"
    order: 3
    visible: true
    
  - title: "Admin"
    url: "/admin"
    icon: "admin"
    order: 4
    visible: true
    admin_only: true

# Templates configuration
templates:
  home: |
    <h1>Welcome to Cloudgene</h1>
    <p>Execute your Nextflow workflows through a user-friendly web interface.</p>
  
  footer: |
    <p>&copy; 2024 Cloudgene. Powered by Django and Nextflow.</p>
  
  about: |
    <h2>About Cloudgene</h2>
    <p>Cloudgene is a workflow execution platform for bioinformatics pipelines.</p>

# Mail configuration
mail:
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  from_email: "noreply@cloudgene.io"
  use_tls: true

# Nextflow configuration  
nextflow:
  binary: "nextflow"
  work_dir: "/tmp/nextflow-work"
  config_file: ""
  max_memory: "8.GB"
  max_cpus: 4
  executor: "local"

# Security settings
security:
  session_timeout: 3600
  max_login_attempts: 5
  lockout_duration: 300
  require_activation: true
  
# Queue settings
queue:
  max_concurrent_jobs: 10
  job_timeout: 86400  # 24 hours
  cleanup_interval: 3600  # 1 hour
  max_job_age: 604800  # 7 days